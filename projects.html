<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArchForm — My Projects</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    /* ── PROJECTS PAGE STYLES ─────────────────────────────── */

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; background: rgba(10,13,18,0.95);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--line);
    }
    .nav-links { display: flex; gap: 10px; align-items: center; }
    .nav-link {
      font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-dim); text-decoration: none; padding: 6px 14px; border: 1px solid var(--line); transition: all 0.2s;
    }
    .nav-link:hover { border-color: var(--blue); color: var(--blue-light); }
    .nav-link.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .nav-link.primary:hover { background: var(--blue-light); border-color: var(--blue-light); }

    main { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 60px 48px; }

    /* PAGE HEADER */
    .page-header { margin-bottom: 52px; display: flex; align-items: flex-end; justify-content: space-between; }
    .page-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--blue-light); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .page-eyebrow::before { content: ''; width: 16px; height: 1px; background: var(--blue-light); }
    h1 { font-family: var(--display); font-size: clamp(48px,6vw,80px); letter-spacing: 1px; line-height: 0.95; }
    .project-count { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dimmer); }

    /* EMPTY STATE */
    .empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 100px 40px; text-align: center; gap: 20px; border: 1px dashed var(--line); }
    .empty-state.show { display: flex; }
    .empty-icon { font-size: 48px; opacity: 0.2; margin-bottom: 8px; }
    .empty-title { font-family: var(--display); font-size: 32px; letter-spacing: 1px; color: var(--text-dimmer); }
    .empty-sub { font-size: 13px; color: var(--text-dimmer); max-width: 340px; line-height: 1.65; }
    .empty-actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn-link { display: inline-block; padding: 12px 28px; border: 1px solid var(--blue); background: var(--blue); font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; text-decoration: none; transition: all 0.2s; }
    .btn-link:hover { background: var(--blue-light); border-color: var(--blue-light); }
    .btn-link.ghost { background: transparent; border-color: var(--line); color: var(--text-dim); }
    .btn-link.ghost:hover { border-color: var(--blue); color: var(--blue-light); }

    /* FILTER BAR */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 28px; }
    .filter-btn { padding: 6px 16px; border: 1px solid var(--line); background: transparent; font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dimmer); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--line2); color: var(--text-dim); }
    .filter-btn.active { border-color: var(--blue); color: var(--blue-light); background: rgba(26,108,255,0.07); }

    /* PROJECTS GRID */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 1px; background: var(--line); }
    .project-card { background: var(--bg2); padding: 32px; position: relative; overflow: hidden; transition: background 0.2s; cursor: pointer; display: flex; flex-direction: column; gap: 20px; }
    .project-card:hover { background: var(--bg3); }
    .project-card::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: linear-gradient(180deg,var(--blue),var(--cyan)); opacity: 0; transition: opacity 0.2s; }
    .project-card:hover::before { opacity: 1; }
    .card-type { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dimmer); display: flex; align-items: center; gap: 6px; }
    .type-dot { width: 6px; height: 6px; border-radius: 50%; }
    .type-dot.brief { background: var(--blue); }
    .type-dot.editor { background: var(--cyan); }
    .card-name { font-family: var(--display); font-size: 28px; letter-spacing: 0.5px; line-height: 1.05; }
    .card-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .card-stat-val { font-family: var(--display); font-size: 22px; color: var(--text); letter-spacing: 0.5px; line-height: 1; }
    .card-stat-label { font-family: var(--mono); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dimmer); margin-top: 3px; }
    .card-date { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--text-dimmer); }
    .card-btn { padding: 7px 14px; border: 1px solid var(--line); background: transparent; font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-block; }
    .card-btn:hover { border-color: var(--blue); color: var(--blue-light); }
    .card-btn.danger { border-color: rgba(255,80,80,0.2); color: rgba(255,100,100,0.5); }
    .card-btn.danger:hover { border-color: rgba(255,80,80,0.5); color: rgba(255,120,120,0.8); }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--line); max-width: 760px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; }
    .modal-header { padding: 28px 32px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: var(--display); font-size: 32px; letter-spacing: 0.5px; }
    .modal-close { background: none; border: 1px solid var(--line); color: var(--text-dim); width: 32px; height: 32px; cursor: pointer; font-size: 16px; transition: all 0.15s; }
    .modal-close:hover { border-color: var(--blue); color: var(--blue-light); }
    .modal-body { padding: 28px 32px; }
    .modal-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
    .modal-stat { background: var(--bg3); padding: 16px; }
    .modal-stat-val { font-family: var(--display); font-size: 28px; color: var(--blue); letter-spacing: 0.5px; }
    .modal-stat-label { font-family: var(--mono); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dimmer); margin-top: 4px; }
    .modal-section { margin-bottom: 24px; }
    .modal-section-title { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dimmer); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
    .brief-text { font-size: 13px; color: var(--text-dim); line-height: 1.75; }
    .brief-text h3 { font-family: var(--display); font-size: 18px; color: var(--text); margin: 12px 0 6px; }
    .modal-actions { display: flex; gap: 10px; padding: 20px 32px; border-top: 1px solid var(--line); }
    .modal-btn { padding: 10px 22px; border: 1px solid var(--line); background: transparent; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
    .modal-btn:hover { border-color: var(--blue); color: var(--blue-light); }
    .modal-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .modal-btn.primary:hover { background: var(--blue-light); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><div class="logo-mark"></div>ARCHFORM</a>
  <div class="nav-links">
    <a href="editor.html"   class="nav-link">Site Editor</a>
    <a href="designer.html" class="nav-link">AI Brief</a>
    <a href="editor.html"   class="nav-link primary">+ New Project</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div>
      <div class="page-eyebrow">Workspace</div>
      <h1>MY PROJECTS</h1>
    </div>
    <div class="project-count" id="projectCount">0 Projects</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')">All</button>
    <button class="filter-btn"        onclick="setFilter('brief')">AI Briefs</button>
    <button class="filter-btn"        onclick="setFilter('editor')">Site Layouts</button>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">⬡</div>
    <div class="empty-title">NO PROJECTS YET</div>
    <p class="empty-sub">Save a design brief or site layout to see your projects here.</p>
    <div class="empty-actions">
      <a href="editor.html"   class="btn-link">Open Site Editor</a>
      <a href="designer.html" class="btn-link ghost">AI Brief Tool</a>
    </div>
  </div>

  <div class="projects-grid" id="projectsGrid"></div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-stats" id="modalStats"></div>
      <div class="modal-section" id="modalBriefSection"  style="display:none"><div class="modal-section-title">Design Brief</div><div class="brief-text" id="modalBrief"></div></div>
      <div class="modal-section" id="modalEditorSection" style="display:none"><div class="modal-section-title">Site Layout</div><div class="brief-text" id="modalEditorInfo"></div></div>
    </div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script src="projects.js"></script>
</body>
</html>
